<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: black;
        }
        .square{
            width: 300px;
            height: 300px;
            background-color: rgb(190, 46, 10);
            text-align: center;
            font-size: 100px;
            animation-name: glow;
            animation-duration: 5s; 
            animation-iteration-count: infinite;
        }
        /* .square:hover{
            background-color: yellowgreen;
            width: 500px;
            transform: rotate();
            transition-timing-function: ease-in-out;
        } */
        @keyframes sideleft{
           from{transform: translate(300%);} 
        }
        @keyframes rotate{
            50%{
                transform: rotate(180deg);
            }
        }
        @keyframes grow{
            50%{
                transform: scale(2,2);
            }
        }
        @keyframes shrink{
         50%{transform: scale(0.5,0.5);}   
        }
        @keyframes fade{
            100%{
                opacity:0 ;
            }
        }
        @keyframes colorchange{
            0%{background-color: blueviolet;}
            20%{background-color: brown;}
            40%{background-color: aquamarine;}
            60%{background-color: aqua;}
            80%{background-color: black;}
        }
        @keyframes glow{
            100%{box-shadow: 0px  0px 50px blanchedalmond;}
        }
    </style>
</head>
<body>
   <div class="square">Hii</div> 
</body>
</html>
