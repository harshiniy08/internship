<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<form action="">
    <label for="Full name">Name:</label>
    <input type="text" placeholder="Enter your name"  name="Full name" id="Full name"><br>
    <!-- email -->
    <label for="Email">Email:</label>
    <input type="email" placeholder="Enter your email" name="Email" id="Email"><br>
    <!-- date of birth -->
    <label for="dob">Date of Birth:</label>
    <input type="date" id="dob" name="dob">
    <!-- button type -->
     <button type ="submit">Submit</button><br>
     <!-- gender -->
     <label for="gender">Gender:</label>
     <input type="radio" name="gender" value="male" id="gender">  
    <label for="gender">male</label>
    <input type="radio" name="gender1" value="female" id="gender1">
    <label for="gender1 ">female </label><br>
    <!-- checkbox       -->
     <label for="course">Courses offered:</label>
     <input type="checkbox" name="course" value="HTML" id="course">
     <label for="course">HTML</label>
     <input type="checkbox" name="course" value="CSS" id="course1">
     <label for="course1">CSS</label>
     <input type="checkbox" name="course" value="JavaScript" id="course2">
     <label for="course2">JavaScript</label><br>
     <!-- dropdown -->
      <label for="country">Country:</label>
      <select name="country" id="country">
        <option value="INDIA">INDIA</option>
        <option value="UK">UK</option>
        <option value=" OTHER">other</option>
        </select><br>
         <!-- textarea   -->
          <label for="message">Enter you college name and id:</label><br>
          <textarea name="message" id="message" rows="4" cols="10"></textarea><br>
          <!-- resume -->
          <label for="resume">Upload Resume:</label>
          <input type="file" name="resume" id="resume"><br>
     <!-- password -->
     <label for="psw">Password:</label>
     <input type="password" placeholder="Enter your password" minlength="8" id="psw"><br>
     <button type="reset">Reset</button><br>
</form>
</body>
</html>
